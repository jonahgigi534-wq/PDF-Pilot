<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; connect-src 'self' data: blob:" />
  <title>PDFPilot</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="toolbar">
    <button id="btn-open" title="Open PDF (Ctrl+O)">Open</button>
    <button id="btn-save" title="Save (Ctrl+S)" disabled>Save</button>
    <button id="btn-save-as" title="Save As (Ctrl+Shift+S)" disabled>Save As</button>
    <button id="btn-print" title="Print (Ctrl+P)" disabled>Print</button>
    <span class="sep"></span>
    <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>Undo</button>
    <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>Redo</button>
    <span class="sep"></span>
    <button id="btn-zoom-out" title="Zoom out" disabled>−</button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-in" title="Zoom in" disabled>+</button>
    <button id="btn-fit-width" title="Fit width" disabled>Fit</button>
    <span class="sep"></span>
    <button id="btn-prev-page" title="Previous page" disabled>◀</button>
    <input id="page-input" type="text" value="" size="3" disabled />
    <span id="page-count-label">/ 0</span>
    <button id="btn-next-page" title="Next page" disabled>▶</button>
    <span class="sep"></span>
    <input id="search-input" type="text" placeholder="Search…" disabled />
    <button id="btn-search-prev" title="Previous match" disabled>↑</button>
    <button id="btn-search-next" title="Next match" disabled>↓</button>
    <span id="search-status"></span>
    <span class="spacer"></span>
    <span id="doc-name"></span>
  </div>

  <div id="workspace">
    <div id="tool-sidebar">
      <button class="tool-btn active" data-tool="select" title="Select text and objects">Select</button>
      <div class="tool-group-label">Edit</div>
      <button class="tool-btn" data-tool="edit-text" title="Click any text to edit it in place">Edit text</button>
      <button class="tool-btn" data-tool="insert-image" title="Insert an image onto the page">Image</button>
      <button class="tool-btn" data-tool="whiteout" title="Cover an area with white">White-out</button>
      <button class="action-btn" id="btn-wordmode" title="Heavy edits: round-trip through your word processor">Word mode…</button>
      <div class="tool-group-label">Annotate</div>
      <button class="tool-btn" data-tool="highlight" title="Select text to highlight it">Highlight</button>
      <button class="tool-btn" data-tool="underline" title="Select text to underline it">Underline</button>
      <button class="tool-btn" data-tool="strikethrough" title="Select text to strike it through">Strike</button>
      <button class="tool-btn" data-tool="note" title="Click the page to add a sticky note">Note</button>
      <button class="tool-btn" data-tool="draw" title="Draw freehand">Draw</button>
      <button class="tool-btn" data-tool="shape-rect" title="Drag to draw a rectangle">Rectangle</button>
      <button class="tool-btn" data-tool="shape-ellipse" title="Drag to draw an ellipse">Ellipse</button>
      <button class="tool-btn" data-tool="shape-line" title="Drag to draw a line">Line</button>
      <button class="tool-btn" data-tool="textbox" title="Click the page to add a text box">Text box</button>
      <select id="annot-color" title="Annotation colour">
        <option value="#e02020">Red</option>
        <option value="#2050e0">Blue</option>
        <option value="#118822">Green</option>
        <option value="#e0a020">Orange</option>
        <option value="#111111">Black</option>
      </select>
      <div class="tool-group-label">Sign</div>
      <button class="tool-btn" data-tool="sign" title="Draw, type or upload a signature and place it">Sign</button>
      <div class="tool-group-label">Forms</div>
      <button class="tool-btn" data-tool="form-text" title="Drag to place a text field">Text field</button>
      <button class="tool-btn" data-tool="form-checkbox" title="Drag to place a checkbox">Checkbox</button>
      <button class="tool-btn" data-tool="form-dropdown" title="Drag to place a dropdown">Dropdown</button>
      <button class="tool-btn" data-tool="form-signature" title="Drag to place a signature field">Sig field</button>
      <div class="tool-group-label">Pages</div>
      <button class="action-btn" id="btn-merge" title="Append other PDFs to this document">Merge…</button>
      <button class="action-btn" id="btn-split" title="Split this document into multiple files">Split…</button>
      <div class="tool-group-label">Tools</div>
      <button class="action-btn" id="btn-compress" title="Reduce file size">Compress…</button>
      <button class="action-btn" id="btn-ocr" title="Recognise text in scanned pages (runs locally)">OCR…</button>
      <button class="action-btn" id="btn-convert" title="PDF ↔ Word, images → PDF">Convert…</button>
      <button class="action-btn" id="btn-export-images" title="Export pages as PNG/JPG">Export images…</button>
      <button class="action-btn" id="btn-protect" title="Set an open password">Protect…</button>
      <button class="action-btn" id="btn-remove-pw" title="Remove the open password">Remove password</button>
      <button class="tool-btn" data-tool="redact" title="Drag areas to redact, then apply">Redact</button>
      <button class="action-btn" id="btn-apply-redactions" disabled title="Permanently black out the marked areas">Apply redactions</button>
    </div>
    <div id="thumb-rail"></div>
    <div id="viewer-container">
      <div id="pages"></div>
      <div id="welcome">
        <h1>PDFPilot</h1>
        <p>Free, open-source PDF editing — fully offline.</p>
        <button id="btn-welcome-open">Open a PDF</button>
      </div>
    </div>
    <div id="side-panel" class="hidden"></div>
  </div>

  <div id="wordmode-bar" class="hidden">
    <span id="wordmode-text"></span>
    <button id="wordmode-reimport">Re-import into PDF</button>
    <button id="wordmode-cancel">Cancel</button>
  </div>

  <div id="statusbar">
    <span id="status-text">Ready</span>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
